<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>หาที่พัก — Trip Finder · IT Outing 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --teal-50:#f0fdfa;--teal-100:#ccfbf1;--teal-200:#99f6e4;--teal-300:#5eead4;--teal-400:#2dd4bf;
  --teal-500:#14b8a6;--teal-600:#0d9488;--teal-700:#0f766e;--teal-800:#115e59;--teal-900:#134e4a;
  --primary:var(--teal-700);--primary-deep:var(--teal-900);
  --sun-300:#fcd34d;--sun-400:#fbbf24;--sun-500:#f59e0b;--accent:var(--sun-400);
  --coral-300:#fda4a0;--coral-400:#fb7367;--coral-500:#f4503f;--pop:var(--coral-400);
  --ink:#0e1f1c;--n-900:#12241f;--n-700:#374843;--n-500:#69807a;--n-400:#8fa39d;
  --n-300:#c5d3cf;--n-200:#dde8e5;--n-100:#eef4f2;--n-50:#f6faf9;--white:#ffffff;
  --success:#0f9d58;--warning:#f59e0b;--error:#e23b4e;--info:#0ea5e9;
  --r-xs:6px;--r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:28px;--r-full:999px;
  --sh-sm:0 1px 2px rgba(15,40,36,.06),0 1px 1px rgba(15,40,36,.04);
  --sh-md:0 4px 14px rgba(15,60,52,.10),0 1px 3px rgba(15,60,52,.06);
  --sh-lg:0 18px 40px rgba(15,60,52,.14),0 4px 10px rgba(15,60,52,.08);
  --font-display:'Kanit',sans-serif;--font-ui:'Prompt',sans-serif;--font-mono:'JetBrains Mono',monospace;
}
html[data-theme="dark"]{
  --ink:#e8f1ee;--white:#13261f;--n-900:#e8f1ee;--n-700:#c2d4ce;--n-500:#93aaa3;--n-400:#6e8881;
  --n-300:#2e564e;--n-200:#244840;--n-100:#1a342e;--n-50:#0a1714;--primary:#19c2b0;
  --sh-sm:0 1px 2px rgba(0,0,0,.4);--sh-md:0 6px 18px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3);
  --sh-lg:0 20px 44px rgba(0,0,0,.55),0 4px 12px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-ui);color:var(--ink);background:var(--n-50);line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}
::selection{background:var(--sun-300);color:var(--primary-deep);}
.app{max-width:1320px;margin:0 auto;padding:0 24px 56px;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:16px;padding:22px 0 18px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand .chip{width:46px;height:46px;border-radius:var(--r-md);background:var(--accent);color:var(--primary-deep);
  display:grid;place-items:center;font-family:var(--font-display);font-weight:800;font-size:21px;transform:rotate(-6deg);box-shadow:3px 3px 0 var(--coral-400);}
.brand h1{font-family:var(--font-display);font-weight:700;font-size:24px;line-height:1.3;}
.brand h1 em{font-style:normal;color:var(--primary);}
.brand p{font-size:12.5px;color:var(--n-500);}
.topbar .spacer{margin-left:auto;}
.tt{font-family:var(--font-ui);font-weight:600;font-size:13px;border:2px solid var(--n-200);background:var(--white);color:var(--ink);
  border-radius:var(--r-full);padding:9px 15px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.15s;}
.tt:hover{border-color:var(--teal-300);}

/* FILTER BAR */
.filterbar{display:flex;gap:14px;align-items:center;flex-wrap:nowrap;background:var(--white);border:1px solid var(--n-200);
  border-radius:var(--r-xl);padding:16px 18px;box-shadow:var(--sh-md);position:sticky;top:14px;z-index:30;}
.fb-fields{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;flex:1;}
.fb-title{display:flex;align-items:center;gap:10px;margin-right:auto;flex-shrink:0;}
.fb-title .dot{width:34px;height:34px;border-radius:var(--r-md);background:var(--accent);color:var(--primary-deep);
  display:grid;place-items:center;font-family:var(--font-display);font-weight:800;transform:rotate(-5deg);box-shadow:2px 2px 0 var(--coral-400);}
.fb-title b{font-family:var(--font-display);font-weight:600;font-size:16px;display:block;white-space:nowrap;line-height:1.3;}
.fb-title span{font-size:12px;color:var(--n-500);}
.field{display:flex;flex-direction:column;gap:5px;}
.field>label{font-size:11px;font-weight:500;color:var(--n-500);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.5px;}
.select{position:relative;display:inline-flex;align-items:center;}
.select select{appearance:none;font-family:var(--font-ui);font-size:14px;font-weight:500;color:var(--ink);background:var(--white);
  border:2px solid var(--n-200);border-radius:var(--r-full);padding:10px 36px 10px 15px;cursor:pointer;transition:.15s;min-width:124px;}
.select select:hover{border-color:var(--teal-300);}
.select select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--teal-100);}
.select .caret{position:absolute;right:14px;pointer-events:none;color:var(--primary);font-size:11px;}
.search{position:relative;display:flex;align-items:center;}
.search input{font-family:var(--font-ui);font-size:14px;border:2px solid var(--n-200);border-radius:var(--r-full);
  padding:10px 16px 10px 38px;min-width:150px;width:100%;background:var(--white);color:var(--ink);transition:.15s;}
.filterbar .field:last-of-type{flex:1;min-width:150px;}
#refreshBtn{flex-shrink:0;}
.search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--teal-100);}
.search .ic{position:absolute;left:14px;color:var(--n-400);font-size:14px;pointer-events:none;}
.btn{font-family:var(--font-ui);font-weight:600;font-size:14px;border:none;cursor:pointer;border-radius:var(--r-full);
  padding:11px 20px;display:inline-flex;align-items:center;gap:8px;transition:.16s;}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 0 var(--primary-deep);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 0 var(--primary-deep);}
.btn-primary:active{transform:translateY(3px);box-shadow:0 1px 0 var(--primary-deep);}
.btn-accent{background:var(--accent);color:var(--primary-deep);box-shadow:0 4px 0 var(--sun-500);}
.btn-accent:hover{transform:translateY(-1px);}
.btn-accent:active{transform:translateY(3px);box-shadow:0 1px 0 var(--sun-500);}
.btn-ghost{background:transparent;color:var(--primary);border:2px solid var(--n-200);}
.btn-ghost:hover{border-color:var(--primary);background:var(--teal-50);}
.btn .spin{animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* CHIPS ROW */
.chips-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:16px 2px 4px;min-height:8px;}
.chips-row .count{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ink);margin-right:4px;}
.chips-row .count b{color:var(--primary);}
.chip-pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;padding:6px 12px;border-radius:var(--r-full);
  background:var(--teal-50);color:var(--teal-800);border:1px solid var(--teal-200);}
.chip-pill .x{opacity:.55;font-weight:700;cursor:pointer;}
.chip-pill .x:hover{opacity:1;}
html[data-theme="dark"] .chip-pill{background:#173a34;color:#9ff0e0;border-color:#235047;}
.chip-clear{font-size:13px;color:var(--pop);font-weight:500;cursor:pointer;background:none;border:none;font-family:var(--font-ui);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:minmax(380px,440px) 1fr;gap:22px;margin-top:14px;align-items:start;}
.list-col{display:flex;flex-direction:column;gap:12px;}
.list-head{display:flex;align-items:baseline;justify-content:space-between;padding:0 4px;}
.list-head h2{font-family:var(--font-display);font-weight:600;font-size:16px;}
.list-head .hint{font-size:12px;color:var(--n-500);}
.list{display:flex;flex-direction:column;gap:11px;max-height:calc(100vh - 80px);overflow-y:auto;padding:2px 4px 4px 2px;}
.list::-webkit-scrollbar{width:8px;}
.list::-webkit-scrollbar-thumb{background:var(--n-300);border-radius:99px;}

/* LIST CARD */
.lc{display:flex;gap:13px;align-items:stretch;background:var(--white);border:1.5px solid var(--n-200);border-radius:var(--r-lg);
  padding:11px;cursor:pointer;transition:.16s;box-shadow:var(--sh-sm);text-align:left;}
.lc:hover{border-color:var(--teal-300);transform:translateY(-2px);box-shadow:var(--sh-md);}
.lc.sel{border-color:var(--primary);box-shadow:0 0 0 3px var(--teal-100),var(--sh-md);}
html[data-theme="dark"] .lc.sel{box-shadow:0 0 0 3px rgba(25,194,176,.25),var(--sh-md);}
.lc .thumb{width:84px;flex-shrink:0;border-radius:var(--r-md);position:relative;overflow:hidden;}
.lc .thumb .ph{position:absolute;inset:0;display:grid;place-items:center;font-size:22px;}
.lc .body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}
.lc .body .t{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.lc h3{font-family:var(--font-display);font-weight:600;font-size:16px;line-height:1.32;}
.lc .prov{font-size:12px;color:var(--n-500);display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lc .meta{display:flex;flex-wrap:wrap;gap:8px;font-size:11.5px;color:var(--n-500);margin-top:2px;}
.lc .foot{display:flex;align-items:flex-end;justify-content:space-between;margin-top:auto;padding-top:4px;}
.lc .price b{font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--primary);}
.lc .price small{font-size:11px;color:var(--n-500);}
.badge{font-size:10.5px;font-weight:600;font-family:var(--font-mono);padding:3px 9px;border-radius:var(--r-full);text-transform:uppercase;letter-spacing:.4px;flex-shrink:0;}
.b-ok{background:#e7f7ef;color:#0a7a44;}.b-warn{background:#fef3c7;color:#92660b;}.b-err{background:#fde7ea;color:#b01e2e;}
html[data-theme="dark"] .b-ok{background:#0d3a26;color:#5fe0a3;}
html[data-theme="dark"] .b-warn{background:#3d2f0a;color:#fbd66a;}
html[data-theme="dark"] .b-err{background:#3d161c;color:#ff97a3;}
.stars{color:var(--sun-500);font-size:11px;letter-spacing:1px;}

/* DETAIL PANEL */
.detail{position:sticky;top:90px;background:var(--white);border:1px solid var(--n-200);border-radius:var(--r-xl);
  box-shadow:var(--sh-md);overflow:hidden;min-height:540px;}
.d-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 40px;min-height:540px;}
.d-empty .ico{width:90px;height:90px;border-radius:var(--r-xl);background:var(--teal-50);border:2px dashed var(--teal-300);
  display:grid;place-items:center;font-size:40px;margin-bottom:20px;transform:rotate(-4deg);}
html[data-theme="dark"] .d-empty .ico{background:#11302a;border-color:var(--teal-600);}
.d-empty h3{font-family:var(--font-display);font-weight:600;font-size:22px;margin-bottom:8px;line-height:1.3;}
.d-empty p{color:var(--n-500);font-size:14px;max-width:300px;}
.d-hero{height:230px;position:relative;display:grid;place-items:center;}
.d-hero .ph{font-size:54px;}
.d-hero .ovl{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,18,16,.55),transparent 55%);}
.d-hero .fav{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:var(--r-full);background:rgba(255,255,255,.92);
  display:grid;place-items:center;color:var(--coral-400);font-size:18px;box-shadow:var(--sh-sm);cursor:pointer;border:none;}
.d-hero .badges{position:absolute;left:16px;top:16px;display:flex;gap:7px;}
.d-hero .name{position:absolute;left:20px;bottom:16px;color:#fff;}
.d-hero .name h2{font-family:var(--font-display);font-weight:700;font-size:25px;text-shadow:0 1px 8px rgba(0,0,0,.4);}
.d-hero .name .p{font-size:13px;opacity:.95;display:flex;align-items:center;gap:5px;}
.d-body{padding:20px 22px 22px;}
.d-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.metapill{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:7px 13px;border-radius:var(--r-full);
  background:var(--n-50);border:1px solid var(--n-200);color:var(--n-700);}
.d-sec{margin-bottom:18px;}
.d-sec h4{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--n-500);margin-bottom:9px;}
.d-desc{font-size:14px;color:var(--n-700);line-height:1.6;}
.amen{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.amen .a{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink);}
.amen .a i{font-style:normal;font-size:16px;width:24px;text-align:center;}
.amen .a.off{color:var(--n-400);text-decoration:line-through;opacity:.6;}
/* price card */
.pcard{background:var(--primary-deep);border-radius:var(--r-lg);padding:18px 20px;color:#fff;}
.pcard .row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--teal-100);padding:4px 0;}
.pcard .row b{color:#fff;font-weight:500;}
.pcard .div{height:1px;background:rgba(255,255,255,.14);margin:9px 0;}
.pcard .total{display:flex;justify-content:space-between;align-items:flex-end;}
.pcard .total .l{font-size:13px;color:var(--teal-200);}
.pcard .total .v{font-family:var(--font-display);font-weight:800;font-size:30px;line-height:1;}
.pcard .total .v small{font-size:14px;color:var(--teal-300);font-weight:500;}
.d-actions{display:flex;gap:10px;margin-top:18px;}
.d-actions .btn{flex:1;justify-content:center;}
.map{height:120px;border-radius:var(--r-md);margin-top:8px;position:relative;overflow:hidden;border:1px solid var(--n-200);
  background:repeating-linear-gradient(0deg,var(--n-100),var(--n-100) 22px,var(--n-50) 22px,var(--n-50) 44px),
  repeating-linear-gradient(90deg,var(--n-100),var(--n-100) 22px,transparent 22px,transparent 44px);}
.map .pin{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);font-size:26px;}
.map .lbl{position:absolute;left:10px;bottom:8px;font-family:var(--font-mono);font-size:11px;color:var(--n-500);background:var(--white);padding:3px 8px;border-radius:var(--r-full);}

/* skeleton */
.sk{background:var(--white);border:1.5px solid var(--n-200);border-radius:var(--r-lg);padding:11px;display:flex;gap:13px;}
.sk .a{width:84px;height:84px;border-radius:var(--r-md);flex-shrink:0;}
.sk .b{flex:1;display:flex;flex-direction:column;gap:9px;padding-top:4px;}
.shimmer{background:linear-gradient(90deg,var(--n-100) 25%,var(--n-200) 37%,var(--n-100) 63%);background-size:400% 100%;animation:sh 1.4s infinite;}
@keyframes sh{0%{background-position:100% 0;}100%{background-position:-100% 0;}}

.no-results{text-align:center;padding:50px 20px;color:var(--n-500);}
.no-results .ico{font-size:38px;margin-bottom:10px;}

.foot{margin-top:28px;padding-top:16px;border-top:2px dashed var(--n-200);color:var(--n-500);font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}

@media (max-width:980px){
  .layout{grid-template-columns:1fr;}
  .detail{position:relative;top:0;}
  .list{max-height:none;}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="chip">IT</div>
      <div>
        <h1>หาที่พักให้ทริปนี้ <em>·</em></h1>
        <p>IT Outing 2026 · Trip Finder · กลุ่ม 24 คน</p>
      </div>
    </div>
    <div class="spacer"></div>
    <button class="tt" id="themeToggle">🌙 Dark</button>
  </header>

  <!-- FILTER BAR -->
  <div class="filterbar">
    <div class="fb-title">
      <div class="dot">≡</div>
      <div><b>กรองที่พัก</b><span id="fbCount">พบ 0 แห่ง</span></div>
    </div>
    <div class="fb-fields">
    <div class="field"><label>จังหวัด</label><div class="select"><select id="fProv"></select><span class="caret">▼</span></div></div>
    <div class="field"><label>ประเภท</label><div class="select"><select id="fType"></select><span class="caret">▼</span></div></div>
    <div class="field"><label>วันที่</label><div class="select"><select id="fDate"></select><span class="caret">▼</span></div></div>
    <div class="field"><label>เรียงตาม</label><div class="select"><select id="fSort">
      <option value="orig">ต้นฉบับ</option>
      <option value="dist">ระยะทาง น้อย→มาก</option>
      <option value="cap">ความจุ มาก→น้อย</option>
      <option value="price">ราคา น้อย→มาก</option>
      <option value="name">ชื่อ ก→ฮ</option>
    </select><span class="caret">▼</span></div></div>
    <div class="field"><label>ค้นหา</label><div class="search"><span class="ic">⌕</span><input id="fSearch" placeholder="ชื่อที่พัก..." /></div></div>
    </div>
    <button class="btn btn-accent" id="refreshBtn">⟳ รีเฟรช</button>
  </div>

  <!-- CHIPS -->
  <div class="chips-row" id="chipsRow"></div>

  <!-- LAYOUT -->
  <main class="layout">
    <section class="list-col">
      <div class="list-head"><h2>ที่พัก</h2><span class="hint">คลิกเพื่อดูรายละเอียด · ราคา</span></div>
      <div class="list" id="list"></div>
    </section>
    <aside class="detail" id="detail"></aside>
  </main>

  <footer class="foot">
    <span>ข้อมูลจาก Google Sheet ของ Golf · อัพเดทอัตโนมัติเมื่อกดรีเฟรช</span>
    <span>IT Outing 2026 · Trip Finder — applied design system</span>
  </footer>
</div>

<script>
/* ---------- DATA ---------- */
const GROUP = 24;
const AMEN = {wifi:['📶','WiFi'],pool:['🏊','สระว่ายน้ำ'],parking:['🅿️','ที่จอดรถ'],kitchen:['🍳','ครัว'],
  ac:['❄️','แอร์'],karaoke:['🎤','คาราโอเกะ'],bbq:['🔥','จุดปิ้งย่าง'],meeting:['📊','ห้องประชุม'],breakfast:['🥐','อาหารเช้า']};
const HUES = ['var(--teal-300)','var(--teal-200)','var(--sun-300)','var(--coral-300)','var(--teal-400)'];
const DATA = [
  {id:1,name:'บ้านพักริมน้ำ เขาใหญ่',prov:'นครราชสีมา',type:'บ้านพัก',cap:12,dist:4.2,price:1290,rating:5,status:'ok',ph:'🏞️',
   amen:['wifi','parking','kitchen','ac','bbq','karaoke'],dates:['14–16 ก.พ.','21–23 ก.พ.'],
   desc:'บ้านพักไม้ริมลำธาร บรรยากาศร่มรื่น เหมาะกับกิจกรรมกลุ่ม มีลานกว้างหน้าบ้านสำหรับเล่นเกมและปิ้งย่างตอนเย็น'},
  {id:2,name:'วนธารา รีสอร์ท',prov:'นครราชสีมา',type:'รีสอร์ท',cap:30,dist:8.0,price:2450,rating:4,status:'warn',ph:'🏨',
   amen:['wifi','pool','parking','ac','meeting','breakfast'],dates:['14–16 ก.พ.'],
   desc:'รีสอร์ทขนาดใหญ่ รองรับได้ทั้งทีม มีห้องประชุมและสระว่ายน้ำ เหมาะถ้าอยากจัด workshop ช่วงกลางวันแล้วพักผ่อนต่อ'},
  {id:3,name:'ภูวิว แคมป์ปิ้ง',prov:'เพชรบูรณ์',type:'แคมป์',cap:20,dist:11,price:800,rating:4,status:'ok',ph:'⛺',
   amen:['parking','bbq','wifi'],dates:['21–23 ก.พ.'],
   desc:'ลานกางเต็นท์วิวภูเขา ทะเลหมอกตอนเช้า เหมาะกับทีมที่ชอบกิจกรรมเอาท์ดอร์ มีจุดปิ้งย่างและก่อแคมป์ไฟ'},
  {id:4,name:'เดอะ ไพน์ โฮมสเตย์',prov:'เพชรบูรณ์',type:'โฮมสเตย์',cap:8,dist:14,price:990,rating:5,status:'ok',ph:'🏡',
   amen:['wifi','kitchen','parking','breakfast'],dates:['14–16 ก.พ.','21–23 ก.พ.'],
   desc:'โฮมสเตย์อบอุ่นกลางสวนสน เจ้าของใจดี อาหารเช้าโฮมเมด เหมาะกับกลุ่มเล็กที่อยากได้ความเป็นส่วนตัว'},
  {id:5,name:'เลควิว แกรนด์ โฮเทล',prov:'นครนายก',type:'โรงแรม',cap:40,dist:6.5,price:3200,rating:4,status:'ok',ph:'🏙️',
   amen:['wifi','pool','parking','ac','meeting','breakfast','karaoke'],dates:['14–16 ก.พ.'],
   desc:'โรงแรมริมทะเลสาบ สิ่งอำนวยความสะดวกครบ ห้องประชุมใหญ่ คาราโอเกะ และร้านอาหารในตัว รองรับทีมขนาดใหญ่ได้สบาย'},
  {id:6,name:'สวนป่า รีทรีท',prov:'นครนายก',type:'รีสอร์ท',cap:16,dist:9.2,price:1750,rating:4,status:'warn',ph:'🌲',
   amen:['wifi','pool','parking','ac','bbq'],dates:['21–23 ก.พ.'],
   desc:'รีสอร์ทกลางป่า เงียบสงบ มีสระว่ายน้ำส่วนตัวและลานกิจกรรม เหมาะกับการพักผ่อนแบบ slow life'},
  {id:7,name:'บ้านสวนริมเขา',prov:'สระบุรี',type:'บ้านพัก',cap:24,dist:5.0,price:1450,rating:5,status:'ok',ph:'⛰️',
   amen:['wifi','kitchen','parking','ac','bbq','karaoke'],dates:['14–16 ก.พ.','21–23 ก.พ.'],
   desc:'บ้านพักหลังใหญ่รับได้ทั้งทีมในหลังเดียว ครัวพร้อมทำอาหาร ลานปิ้งย่างและคาราโอเกะ คุ้มมากสำหรับกลุ่ม'},
  {id:8,name:'มิสตี้ ฮิลล์ แคมป์',prov:'สระบุรี',type:'แคมป์',cap:18,dist:13,price:650,rating:3,status:'full',ph:'🏕️',
   amen:['parking','bbq'],dates:['14–16 ก.พ.'],
   desc:'แคมป์วิวหุบเขา ราคาประหยัด เหมาะกับทีมที่เน้นกิจกรรมกลางแจ้งและงบจำกัด (รอบนี้เต็มแล้ว — เปิดจองรอบหน้า)'},
  {id:9,name:'ทะเลหมอก โฮมสเตย์',prov:'เพชรบูรณ์',type:'โฮมสเตย์',cap:10,dist:16,price:1100,rating:5,status:'ok',ph:'🌫️',
   amen:['wifi','kitchen','parking','breakfast','bbq'],dates:['21–23 ก.พ.'],
   desc:'โฮมสเตย์บนยอดเขา ชมทะเลหมอกได้จากระเบียงห้อง อากาศเย็นสบายตลอดปี อาหารเช้าพื้นเมืองรสเด็ด'},
];
const STATUS = {ok:['ว่าง','b-ok'],warn:['เหลือน้อย','b-warn'],full:['เต็มแล้ว','b-err']};

/* ---------- STATE ---------- */
let state = {prov:'',type:'',date:'',sort:'orig',q:'',sel:null,loading:false};

/* ---------- HELPERS ---------- */
const $ = s=>document.querySelector(s);
const baht = n=>'฿'+n.toLocaleString('en-US');
function rooms(cap){return Math.ceil(GROUP/cap);}
function uniq(key){return [...new Set(DATA.map(d=>d[key]))];}
function dateOptions(){return [...new Set(DATA.flatMap(d=>d.dates))];}

/* ---------- FILTER + SORT ---------- */
function results(){
  let r = DATA.filter(d=>
    (!state.prov||d.prov===state.prov)&&
    (!state.type||d.type===state.type)&&
    (!state.date||d.dates.includes(state.date))&&
    (!state.q||d.name.toLowerCase().includes(state.q.toLowerCase()))
  );
  const s=state.sort;
  if(s==='dist')r=[...r].sort((a,b)=>a.dist-b.dist);
  else if(s==='cap')r=[...r].sort((a,b)=>b.cap-a.cap);
  else if(s==='price')r=[...r].sort((a,b)=>a.price-b.price);
  else if(s==='name')r=[...r].sort((a,b)=>a.name.localeCompare(b.name,'th'));
  return r;
}

/* ---------- RENDER LIST ---------- */
function thumb(d,big){const hue=HUES[d.id%HUES.length];
  return `background:repeating-linear-gradient(45deg,${hue},${hue} 10px,var(--teal-50) 10px,var(--teal-50) 20px);`;}
function renderList(){
  const list=$('#list');
  if(state.loading){
    list.innerHTML=Array(4).fill(0).map(()=>`<div class="sk"><div class="a shimmer"></div><div class="b">
      <div class="shimmer" style="height:14px;width:70%;border-radius:99px;"></div>
      <div class="shimmer" style="height:11px;width:45%;border-radius:99px;"></div>
      <div class="shimmer" style="height:11px;width:60%;border-radius:99px;margin-top:auto;"></div></div></div>`).join('');
    return;
  }
  const r=results();
  $('#fbCount').textContent='พบ '+r.length+' แห่ง';
  if(!r.length){list.innerHTML=`<div class="no-results"><div class="ico">🔍</div><b>ไม่พบที่พักที่ตรงเงื่อนไข</b><br/><span style="font-size:13px;">ลองล้างตัวกรองบางอย่างดูนะ</span></div>`;return;}
  list.innerHTML=r.map(d=>{
    const st=STATUS[d.status];
    return `<button class="lc ${state.sel===d.id?'sel':''}" data-id="${d.id}">
      <div class="thumb" style="${thumb(d)}"><span class="ph">${d.ph}</span></div>
      <div class="body">
        <div class="t"><div><h3>${d.name}</h3><div class="prov">📍 ${d.prov} · ${d.type}</div></div>
          <span class="badge ${st[1]}">${st[0]}</span></div>
        <div class="meta"><span>👥 ${d.cap} คน/หลัง</span><span>🚗 ${d.dist} กม.</span><span class="stars">${'★'.repeat(d.rating)}</span></div>
        <div class="foot"><div class="price"><b>${baht(d.price)}</b> <small>/ คืน</small></div>
          <span style="font-size:12px;color:var(--n-500);">฿${(d.price*2*rooms(d.cap)).toLocaleString()} โดยประมาณ</span></div>
      </div></button>`;
  }).join('');
  list.querySelectorAll('.lc').forEach(el=>el.onclick=()=>{state.sel=+el.dataset.id;renderList();renderDetail();});
}

/* ---------- RENDER DETAIL ---------- */
function renderDetail(){
  const d=DATA.find(x=>x.id===state.sel);
  const panel=$('#detail');
  if(!d){panel.innerHTML=`<div class="d-empty"><div class="ico">🗺️</div>
    <h3>เลือกสถานที่จากรายการ</h3><p>คลิกที่พักทางซ้ายมือเพื่อดูราคา สิ่งอำนวยความสะดวก และรายละเอียดทั้งหมด</p></div>`;return;}
  const st=STATUS[d.status];const rm=rooms(d.cap);const nights=2;const total=d.price*nights*rm;
  panel.innerHTML=`
    <div class="d-hero" style="${thumb(d,true)}">
      <span class="ph">${d.ph}</span><div class="ovl"></div>
      <div class="badges"><span class="badge ${st[1]}">${st[0]}</span></div>
      <button class="fav">♡</button>
      <div class="name"><h2>${d.name}</h2><div class="p">📍 ${d.prov} · ${d.type} <span class="stars" style="color:var(--sun-300);">${'★'.repeat(d.rating)}</span></div></div>
    </div>
    <div class="d-body">
      <div class="d-meta">
        <span class="metapill">👥 ${d.cap} คน / หลัง</span>
        <span class="metapill">🚗 ${d.dist} กม. จากจุดนัดพบ</span>
        <span class="metapill">🏠 ใช้ ${rm} หลัง สำหรับ ${GROUP} คน</span>
      </div>
      <div class="d-sec"><h4>เกี่ยวกับที่พัก</h4><p class="d-desc">${d.desc}</p></div>
      <div class="d-sec"><h4>สิ่งอำนวยความสะดวก</h4>
        <div class="amen">${Object.keys(AMEN).map(k=>{const has=d.amen.includes(k);
          return `<div class="a ${has?'':'off'}"><i>${AMEN[k][0]}</i> ${AMEN[k][1]}</div>`;}).join('')}</div></div>
      <div class="d-sec"><h4>ที่ตั้ง</h4>
        <div class="map"><span class="pin">📍</span><span class="lbl">${d.prov} · ${d.dist} กม.</span></div></div>
      <div class="pcard">
        <div class="row"><span>ราคาต่อหลัง / คืน</span><b>${baht(d.price)}</b></div>
        <div class="row"><span>จำนวนหลัง (${GROUP} คน ÷ ${d.cap})</span><b>${rm} หลัง</b></div>
        <div class="row"><span>จำนวนคืน</span><b>${nights} คืน</b></div>
        <div class="div"></div>
        <div class="total"><div class="l">รวมโดยประมาณ<br/><span style="font-size:11px;opacity:.8;">${d.price}×${rm}×${nights}</span></div>
          <div class="v">${baht(total)}</div></div>
      </div>
      <div class="d-actions">
        <button class="btn btn-ghost" onclick="this.textContent='♥ บันทึกแล้ว'">♡ บันทึก</button>
        <button class="btn btn-primary" ${d.status==='full'?'disabled style="opacity:.5;cursor:not-allowed;box-shadow:none;"':''}>${d.status==='full'?'เต็มแล้ว':'เลือกที่พักนี้ →'}</button>
      </div>
    </div>`;
}

/* ---------- CHIPS ---------- */
function renderChips(){
  const row=$('#chipsRow');const chips=[];
  let html=``;
  if(state.prov)chips.push(['prov',state.prov]);
  if(state.type)chips.push(['type',state.type]);
  if(state.date)chips.push(['date',state.date]);
  if(state.q)chips.push(['q','“'+state.q+'”']);
  html+=chips.map(([k,v])=>`<span class="chip-pill">${v} <span class="x" data-k="${k}">✕</span></span>`).join('');
  if(chips.length)html+=`<button class="chip-clear" id="clearAll">ล้างทั้งหมด</button>`;
  row.innerHTML=html;
  row.querySelectorAll('.x').forEach(x=>x.onclick=()=>{
    const k=x.dataset.k;if(k==='q'){state.q='';$('#fSearch').value='';}else state[k]='';
    syncSelects();update();});
  const clr=$('#clearAll');if(clr)clr.onclick=()=>{state.prov=state.type=state.date='';state.q='';state.sort='orig';
    $('#fSearch').value='';syncSelects();$('#fSort').value='orig';update();};
}

/* ---------- SELECTS ---------- */
function buildSelects(){
  $('#fProv').innerHTML='<option value="">ทุกจังหวัด</option>'+uniq('prov').map(p=>`<option>${p}</option>`).join('');
  $('#fType').innerHTML='<option value="">ทุกประเภท</option>'+uniq('type').map(t=>`<option>${t}</option>`).join('');
  $('#fDate').innerHTML='<option value="">ทุกวันที่</option>'+dateOptions().map(d=>`<option>${d}</option>`).join('');
}
function syncSelects(){$('#fProv').value=state.prov;$('#fType').value=state.type;$('#fDate').value=state.date;}

function update(){renderChips();renderList();renderDetail();}

/* ---------- EVENTS ---------- */
function bind(){
  $('#fProv').onchange=e=>{state.prov=e.target.value;update();};
  $('#fType').onchange=e=>{state.type=e.target.value;update();};
  $('#fDate').onchange=e=>{state.date=e.target.value;update();};
  $('#fSort').onchange=e=>{state.sort=e.target.value;renderList();};
  $('#fSearch').oninput=e=>{state.q=e.target.value;update();};
  $('#refreshBtn').onclick=()=>{
    const b=$('#refreshBtn');b.innerHTML='<span class="spin">⟳</span> กำลังโหลด...';
    state.loading=true;renderList();
    setTimeout(()=>{state.loading=false;renderList();renderChips();b.innerHTML='⟳ รีเฟรช';},850);
  };
  // theme
  const root=document.documentElement,tt=$('#themeToggle');
  if(localStorage.getItem('itouting-theme')==='dark')root.setAttribute('data-theme','dark');
  const syncT=()=>{const d=root.getAttribute('data-theme')==='dark';tt.textContent=d?'☀️ Light':'🌙 Dark';};
  tt.onclick=()=>{const d=root.getAttribute('data-theme')==='dark';
    if(d){root.removeAttribute('data-theme');localStorage.setItem('itouting-theme','light');}
    else{root.setAttribute('data-theme','dark');localStorage.setItem('itouting-theme','dark');}syncT();};
  syncT();
}

buildSelects();bind();update();
</script>
</body>
</html>
