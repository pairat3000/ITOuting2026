name: Inject Dashboard Patch
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Inject dashboard-patch.js into index.html
        shell: python3 {0}
        run: |
          content = open('index.html', encoding='utf-8').read()
          tag = '<script src="dashboard-patch.js"></script>'
          if tag not in content:
              idx = content.rfind('</script>')
              content = content[:idx + 9] + '\n' + tag + content[idx + 9:]
              open('index.html', 'w', encoding='utf-8').write(content)
              print('Success: injected tag')
          else:
              print('Tag already present, skipping')

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "No changes needed" || git commit -m "feat: load dashboard-patch.js for dashboard + vote fix"
          git push
