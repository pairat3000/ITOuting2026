<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หาที่พัก — Trip Finder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root {
    --bg: #F6F4EF;
    --surface: #FFFFFF;
    --ink: #20242B;
    --ink-soft: #6B7178;
    --line: #E3E0D8;
    --accent: #1D6F5C;
    --accent-soft: #E1F0EA;
    --tag: #F1EFE8;
    --tag-ink: #5F5E5A;
    --good: #1D6F5C;
    --good-bg: #E1F0EA;
    --sidebar-w: 260px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .topbar-title { flex: 0 0 auto; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); font-weight: 600;
  }
  .topbar-title h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.25rem; font-weight: 400; letter-spacing: -0.01em;
  }
  .topbar-controls {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center; flex: 1;
  }
  select, button {
    font-family: inherit; font-size: 13px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    border-radius: 6px;
    padding: 7px 11px;
    cursor: pointer;
  }
  select { min-width: 130px; }
  select:focus, button:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button#refresh-btn {
    white-space: nowrap; display: flex; align-items: center; gap: 6px;
    font-weight: 500; background: var(--accent); color: #fff; border-color: var(--accent);
  }
  button#refresh-btn:hover { opacity: 0.9; }
  button#refresh-btn.spinning i { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-bar {
    font-size: 12px; color: var(--ink-soft);
    padding: 0.4rem 1.5rem;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .status-bar.error { color: #A32D2D; }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    border-right: 1px solid var(--line);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 0.75rem 1rem;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .sidebar-list {
    overflow-y: auto;
    flex: 1;
  }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  .place-btn {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    width: 100%;
    text-align: left;
    padding: 0.7rem 1rem;
    border: none;
    border-radius: 0;
    border-bottom: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    font-size: 13.5px;
    line-height: 1.4;
    cursor: pointer;
    transition: background 0.1s;
  }
  .place-btn:hover { background: var(--bg); }
  .place-btn.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
    border-left: 3px solid var(--accent);
    padding-left: calc(1rem - 3px);
  }
  .place-btn .btn-no {
    font-size: 11px;
    color: var(--ink-soft);
    flex-shrink: 0;
    margin-top: 2px;
    min-width: 18px;
  }
  .place-btn.active .btn-no { color: var(--accent); opacity: 0.7; }

  /* ── Detail panel ── */
  .detail-panel {
    flex: 1;
    overflow-y: auto;
    padding: 2rem 2.5rem;
    min-width: 0;
  }
  .detail-panel::-webkit-scrollbar { width: 6px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  .detail-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--ink-soft); text-align: center; gap: 0.5rem;
  }
  .detail-empty i { font-size: 2.5rem; opacity: 0.3; }
  .detail-empty p { font-size: 14px; }

  .detail-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 1rem; margin-bottom: 1.5rem;
  }
  .detail-head h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 400; line-height: 1.3;
  }
  .badge {
    font-size: 11px; padding: 4px 12px; border-radius: 20px;
    background: var(--accent-soft); color: var(--accent);
    white-space: nowrap; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; flex-shrink: 0; margin-top: 4px;
  }

  .detail-meta {
    display: flex; flex-wrap: wrap; gap: 1rem;
    margin-bottom: 1.5rem;
    padding: 1rem 1.25rem;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--line);
  }
  .meta-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; color: var(--ink-soft);
  }
  .meta-item i { color: var(--accent); font-size: 16px; }
  .meta-item strong { color: var(--ink); }

  .section { margin-bottom: 1.5rem; }
  .section-label {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-soft); font-weight: 600; margin-bottom: 0.6rem;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 13px; padding: 4px 12px; border-radius: 20px;
    background: var(--tag); color: var(--tag-ink);
  }
  .date-tag {
    font-size: 13px; padding: 4px 12px; border-radius: 20px;
    background: var(--good-bg); color: var(--good);
    display: flex; align-items: center; gap: 5px; font-weight: 500;
  }
  .no-val { font-size: 13px; color: #B4B2A9; }

  .detail-links { display: flex; gap: 10px; margin-top: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .detail-text { font-size: 14px; color: var(--ink); line-height: 1.7; white-space: pre-wrap; }
  .detail-links a {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border: 1px solid var(--line); border-radius: 7px;
    text-decoration: none; color: var(--ink); font-size: 14px;
    transition: background 0.15s, border-color 0.15s;
  }
  .detail-links a:hover { background: var(--bg); border-color: var(--accent); }
  .detail-links a.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .detail-links a.primary:hover { opacity: 0.9; }

  /* ── Photo thumbnails ── */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
  }
  .photo-thumb {
    aspect-ratio: 4/3;
    border-radius: 7px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
    background: var(--bg);
  }
  .photo-thumb:hover { border-color: var(--accent); transform: scale(1.03); }
  .photo-thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .photo-thumb .img-err {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft); font-size: 11px; background: var(--bg);
  }
  .photo-loading {
    font-size: 13px; color: var(--ink-soft);
    display: flex; align-items: center; gap: 6px; padding: 0.25rem 0;
  }
  .photo-loading i { animation: spin 1s linear infinite; }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.92);
    flex-direction: column;
    align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox-img-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    width: 100%; padding: 3rem 5rem; min-height: 0;
  }
  .lightbox-img-wrap img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .lightbox-bar {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1.5rem;
    background: rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
  .lb-btn {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; gap: 5px; transition: background 0.15s;
  }
  .lb-btn:hover { background: rgba(255,255,255,0.2); }
  .lb-counter { color: rgba(255,255,255,0.7); font-size: 13px; }
  .lb-close {
    position: fixed; top: 1rem; right: 1rem;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; border-radius: 50%; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; transition: background 0.15s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.25); }
  .lb-prev, .lb-next {
    position: fixed; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; border-radius: 50%; width: 46px; height: 46px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 20px; transition: background 0.15s;
  }
  .lb-prev { left: 1rem; }
  .lb-next { right: 1rem; }
  .lb-prev:hover, .lb-next:hover { background: rgba(255,255,255,0.25); }

  footer {
    font-size: 11px; color: var(--ink-soft); text-align: center;
    padding: 0.5rem 1rem;
    border-top: 1px solid var(--line);
    background: var(--surface);
    flex-shrink: 0;
  }

  /* ── Mobile: stack vertically ── */
  @media (max-width: 640px) {
    body { overflow: auto; height: auto; }
    .main { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--line); max-height: 220px; }
    .detail-panel { padding: 1.25rem 1rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    button#refresh-btn.spinning i { animation: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    <div class="eyebrow">Trip planner</div>
    <h1>หาที่พักให้ทริปนี้</h1>
  </div>
  <div class="topbar-controls">
    <select id="filter-province"><option value="">ทุกจังหวัด</option></select>
    <select id="filter-type"><option value="">ทุกประเภท</option></select>
    <select id="filter-date"><option value="">ทุกวันที่</option></select>
    <button id="refresh-btn"><i class="ti ti-refresh"></i>รีเฟรช</button>
  </div>
</div>

<div class="status-bar" id="status-line">กำลังโหลด...</div>

<div class="main">
  <nav class="sidebar">
    <div class="sidebar-header">รายชื่อสถานที่</div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </nav>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty">
      <i class="ti ti-map-pin-off"></i>
      <p>เลือกสถานที่จากรายการทางซ้ายมือ</p>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lb-close" id="lb-close" aria-label="ปิด"><i class="ti ti-x"></i></button>
  <button class="lb-prev" id="lb-prev" aria-label="ก่อนหน้า"><i class="ti ti-chevron-left"></i></button>
  <button class="lb-next" id="lb-next" aria-label="ถัดไป"><i class="ti ti-chevron-right"></i></button>
  <div class="lightbox-img-wrap">
    <img id="lb-img" src="" alt="">
  </div>
  <div class="lightbox-bar">
    <span class="lb-counter" id="lb-counter"></span>
  </div>
</div>

<footer>ข้อมูลจาก Google Sheet ของ Golf · อัพเดทอัตโนมัติเมื่อกดรีเฟรช</footer>

<script>
const PUB_ID = "2PACX-1vRxRCrmw0Day_vhNpryKVgls3wmIaAstPWbERRH6hZ2nPmkCM0hLCzj7UL6zYVXk0-ofJ10ulJvg9Kp";
const SHEET_ID = "1R9ppCaIF8aYhOIBlx_kqXJNk6sZjQUTEdu_TUXIY2EY";
const DRIVE_API_KEY = "AIzaSyCFdDRdsSgJ9tRk2I4hi6rnNx_N0Dw1Jfs";

const CSV_URLS = [
  `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?output=csv`,
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`,
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`
];

let allRows = [];
let filteredRows = [];
let dateColumns = [];
let activeIdx = null;

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && next === '\n') continue;
        row.push(field); rows.push(row); row = []; field = '';
      } else field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function buildData(rows) {
  const headerMain = rows[0];
  const headerSub = rows[1];

  function findSection(keyword) {
    const start = headerMain.findIndex(h => h.trim().includes(keyword));
    if (start === -1) return null;
    let end = headerMain.length;
    for (let i = start + 1; i < headerMain.length; i++) {
      if (headerMain[i].trim()) { end = i; break; }
    }
    return { start, end };
  }

  const distIdx  = headerMain.findIndex(h => h.includes('ระยะทาง'));
  const durIdx   = headerMain.findIndex(h => h.includes('ระยะเวลา'));
  const vanIdx   = headerMain.findIndex(h => h.includes('วันว่าง'));
  const locIdx   = headerMain.findIndex(h => h.trim() === 'Location');

  const accomSec = findSection('ประเภทที่พัก');
  const foodSec  = findSection('อาหาร');
  const actSec   = findSection('กิจกรรม');

  dateColumns = [];
  for (let i = vanIdx; i < distIdx; i++) {
    if (headerSub[i] && headerSub[i].trim()) dateColumns.push({ idx: i, label: headerSub[i].trim() });
  }

  function parseSection(row, sec) {
    if (!sec) return [];
    const result = [];
    for (let c = sec.start; c < sec.end; c++) {
      const val = row[c] ? row[c].trim() : '';
      if (val && val !== 'ไม่มี') {
        const label = headerSub[c] ? headerSub[c].trim() : val;
        result.push(label || val);
      }
    }
    return result;
  }

  const data = [];
  for (let r = 2; r < rows.length; r++) {
    const row = rows[r];
    if (!row[1] || !row[1].trim()) continue;
    const item = {
      no: row[0],
      name: row[1],
      type: row[2],
      link: row[3],
      province: row[4],
      capacity: row[5],
      accomTypes: parseSection(row, accomSec),
      food: parseSection(row, foodSec),
      activities: parseSection(row, actSec),
      dates: [],
      distance: row[distIdx] ? row[distIdx].trim() : '',
      duration: row[durIdx] ? row[durIdx].trim() : '',
      mapLink: row[locIdx] ? row[locIdx].trim() : '',
      detail: row[27] ? row[27].trim() : '',
      photoSrc: row[34] ? row[34].trim() : ''
    };

    dateColumns.forEach(d => {
      if (row[d.idx] && row[d.idx].trim().toLowerCase() === 'x') item.dates.push(d.label);
    });

    data.push(item);
  }
  return data;
}

function populateFilters(data) {
  const provinces = [...new Set(data.map(d => d.province).filter(Boolean))];
  const types = [...new Set(data.map(d => d.type).filter(Boolean))];

  const provSel = document.getElementById('filter-province');
  while (provSel.children.length > 1) provSel.removeChild(provSel.lastChild);
  provinces.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    provSel.appendChild(opt);
  });

  const typeSel = document.getElementById('filter-type');
  while (typeSel.children.length > 1) typeSel.removeChild(typeSel.lastChild);
  types.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    typeSel.appendChild(opt);
  });

  const dateSel = document.getElementById('filter-date');
  while (dateSel.children.length > 1) dateSel.removeChild(dateSel.lastChild);
  dateColumns.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.label; opt.textContent = d.label;
    dateSel.appendChild(opt);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Google Drive helpers ──
function extractFolderId(url) {
  const m = url.match(/\/folders\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

function extractFileId(url) {
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  return m2 ? m2[1] : null;
}

function thumbUrl(fileId) {
  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`;
}

function fullUrl(fileId) {
  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1920`;
}

async function fetchFolderImages(folderId) {
  const q = encodeURIComponent(`'${folderId}' in parents and mimeType contains 'image/' and trashed = false`);
  const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&orderBy=name&key=${DRIVE_API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    throw new Error(`Drive API ${res.status}: ${body.slice(0, 120)}`);
  }
  const json = await res.json();
  return (json.files || []).map(f => f.id);
}

async function resolvePhotoIds(photoSrc) {
  const fileIds = [];
  const rawUrls = photoSrc.split(/[\n\r,]+/).map(u => u.trim()).filter(u => u.startsWith('http'));
  for (const url of rawUrls) {
    const folderId = extractFolderId(url);
    if (folderId) {
      const ids = await fetchFolderImages(folderId);
      fileIds.push(...ids);
    } else {
      const fileId = extractFileId(url);
      if (fileId) fileIds.push(fileId);
    }
  }
  return fileIds;
}

// ── Lightbox ──
let lbFileIds = [];
let lbCurrent = 0;

function openLightbox(fileIds, startIdx) {
  lbFileIds = fileIds;
  lbCurrent = startIdx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function updateLightbox() {
  document.getElementById('lb-img').src = fullUrl(lbFileIds[lbCurrent]);
  document.getElementById('lb-counter').textContent = `${lbCurrent + 1} / ${lbFileIds.length}`;
  document.getElementById('lb-prev').style.display = lbFileIds.length <= 1 ? 'none' : '';
  document.getElementById('lb-next').style.display = lbFileIds.length <= 1 ? 'none' : '';
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => {
  lbCurrent = (lbCurrent - 1 + lbFileIds.length) % lbFileIds.length;
  updateLightbox();
});
document.getElementById('lb-next').addEventListener('click', () => {
  lbCurrent = (lbCurrent + 1) % lbFileIds.length;
  updateLightbox();
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') { lbCurrent = (lbCurrent - 1 + lbFileIds.length) % lbFileIds.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbCurrent = (lbCurrent + 1) % lbFileIds.length; updateLightbox(); }
});

// ── Async photo section ──
async function renderPhotoSection(d, panel) {
  if (!d.photoSrc) return;

  const section = document.createElement('div');
  section.className = 'section';

  const label = document.createElement('div');
  label.className = 'section-label';
  label.textContent = 'รูปภาพ';
  section.appendChild(label);

  const loader = document.createElement('div');
  loader.className = 'photo-loading';
  loader.innerHTML = '<i class="ti ti-loader-2"></i> กำลังโหลดรูป...';
  section.appendChild(loader);

  panel.appendChild(section);

  if (!DRIVE_API_KEY) {
    loader.outerHTML = '<span class="no-val">ยังไม่ได้ตั้งค่า DRIVE_API_KEY</span>';
    return;
  }

  try {
    const fileIds = await resolvePhotoIds(d.photoSrc);
    loader.remove();

    if (fileIds.length === 0) {
      const s = document.createElement('span');
      s.className = 'no-val'; s.textContent = 'ไม่มีรูปในโฟลเดอร์';
      section.appendChild(s);
      return;
    }

    label.textContent = `รูปภาพ (${fileIds.length})`;

    const grid = document.createElement('div');
    grid.className = 'photo-grid';

    fileIds.forEach((id, idx) => {
      const thumb = document.createElement('div');
      thumb.className = 'photo-thumb';
      const img = document.createElement('img');
      img.alt = `รูปที่ ${idx + 1}`;
      img.loading = 'lazy';
      img.src = thumbUrl(id);
      img.onerror = () => { thumb.innerHTML = `<div class="img-err"><i class="ti ti-photo-off"></i></div>`; };
      thumb.appendChild(img);
      thumb.addEventListener('click', () => openLightbox(fileIds, idx));
      grid.appendChild(thumb);
    });

    section.appendChild(grid);
  } catch (err) {
    loader.className = 'no-val';
    loader.innerHTML = `<i class="ti ti-alert-triangle"></i> ${escapeHtml(err.message)}`;
  }
}

function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';

  if (filteredRows.length === 0) {
    list.innerHTML = '<div style="padding:1rem;font-size:13px;color:var(--ink-soft)">ไม่พบรายการ</div>';
    showEmpty();
    return;
  }

  filteredRows.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'place-btn' + (i === activeIdx ? ' active' : '');
    btn.innerHTML = `<span class="btn-no">${escapeHtml(d.no || String(i+1))}</span><span>${escapeHtml(d.name)}</span>`;
    btn.addEventListener('click', () => selectPlace(i));
    list.appendChild(btn);
  });
}

function selectPlace(i) {
  activeIdx = i;
  document.querySelectorAll('.place-btn').forEach((btn, idx) => {
    btn.classList.toggle('active', idx === i);
  });
  renderDetail(filteredRows[i]);
}

function showEmpty() {
  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-empty">
      <i class="ti ti-map-pin-off"></i>
      <p>เลือกสถานที่จากรายการทางซ้ายมือ</p>
    </div>`;
}

function renderDetail(d) {
  const panel = document.getElementById('detail-panel');

  let html = `
    <div class="detail-head">
      <h2>${escapeHtml(d.name)}</h2>
      <span class="badge">${escapeHtml(d.type || '-')}</span>
    </div>

    <div class="detail-meta">`;

  if (d.province) html += `<div class="meta-item"><i class="ti ti-map-pin"></i><span>${escapeHtml(d.province)}</span></div>`;
  if (d.capacity) html += `<div class="meta-item"><i class="ti ti-users"></i><strong>${escapeHtml(d.capacity)}</strong>&nbsp;คน</div>`;
  if (d.distance) html += `<div class="meta-item"><i class="ti ti-road"></i><strong>${escapeHtml(d.distance)}</strong>&nbsp;กม.</div>`;
  if (d.duration) html += `<div class="meta-item"><i class="ti ti-clock"></i><strong>${escapeHtml(d.duration)}</strong>&nbsp;ชม.</div>`;

  html += `</div>`;

  if (d.accomTypes.length) {
    html += `<div class="section">
      <div class="section-label">ประเภทที่พัก</div>
      <div class="tags">`;
    d.accomTypes.forEach(t => html += `<span class="tag">${escapeHtml(t)}</span>`);
    html += `</div></div>`;
  }

  if (d.food && d.food.length) {
    html += `<div class="section">
      <div class="section-label">อาหาร</div>
      <div class="tags">`;
    d.food.forEach(f => html += `<span class="tag">${escapeHtml(f)}</span>`);
    html += `</div></div>`;
  }

  if (d.activities.length) {
    html += `<div class="section">
      <div class="section-label">กิจกรรม</div>
      <div class="tags">`;
    d.activities.forEach(a => html += `<span class="tag">${escapeHtml(a)}</span>`);
    html += `</div></div>`;
  }

  html += `<div class="section">
    <div class="section-label">วันว่าง</div>
    <div class="tags">`;
  if (d.dates.length) {
    d.dates.forEach(dt => html += `<span class="date-tag"><i class="ti ti-calendar-check"></i>${escapeHtml(dt)}</span>`);
  } else {
    html += `<span class="no-val">ไม่มีข้อมูลวันว่าง</span>`;
  }
  html += `</div></div>`;

  html += `<div class="detail-links">`;
  if (d.link) html += `<a class="primary" href="${escapeHtml(d.link.split('\n')[0].trim())}" target="_blank" rel="noopener"><i class="ti ti-brand-facebook"></i>Facebook ที่พัก</a>`;
  if (d.mapLink) html += `<a href="${escapeHtml(d.mapLink)}" target="_blank" rel="noopener"><i class="ti ti-map"></i>ดูแผนที่</a>`;
  html += `</div>`;

  if (d.detail) {
    html += `<div class="section">
      <div class="section-label">รายละเอียด</div>
      <p class="detail-text">${escapeHtml(d.detail)}</p>
    </div>`;
  }

  panel.innerHTML = html;
  renderPhotoSection(d, panel);
}

function applyFilters() {
  const provFilter = document.getElementById('filter-province').value;
  const typeFilter = document.getElementById('filter-type').value;
  const dateFilter = document.getElementById('filter-date').value;

  filteredRows = allRows.filter(d => {
    if (provFilter && d.province !== provFilter) return false;
    if (typeFilter && d.type !== typeFilter) return false;
    if (dateFilter && !d.dates.includes(dateFilter)) return false;
    return true;
  });

  document.getElementById('status-line').className = 'status-bar';
  document.getElementById('status-line').textContent =
    `พบ ${filteredRows.length} ที่พัก จากทั้งหมด ${allRows.length} รายการ · อัพเดทล่าสุด ${new Date().toLocaleTimeString('th-TH')}`;

  activeIdx = null;
  renderSidebar();
  showEmpty();
}

async function tryLoad(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('status ' + res.status);
  const text = await res.text();
  if (text.trim().startsWith('<')) throw new Error('got HTML, not CSV');
  return text;
}

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  document.getElementById('status-line').className = 'status-bar';
  document.getElementById('status-line').textContent = 'กำลังโหลดข้อมูล...';
  let lastErr = null;
  for (const url of CSV_URLS) {
    try {
      const text = await tryLoad(url);
      const rows = parseCSV(text);
      allRows = buildData(rows);
      populateFilters(allRows);
      applyFilters();
      btn.classList.remove('spinning');
      return;
    } catch (err) {
      lastErr = err;
    }
  }
  btn.classList.remove('spinning');
  document.getElementById('status-line').className = 'status-bar error';
  document.getElementById('status-line').innerHTML =
    `<i class="ti ti-alert-circle"></i> โหลดข้อมูลไม่สำเร็จ (${lastErr ? lastErr.message : 'unknown'}) — ตรวจสอบว่า sheet เป็น public`;
}

document.getElementById('filter-province').addEventListener('change', applyFilters);
document.getElementById('filter-type').addEventListener('change', applyFilters);
document.getElementById('filter-date').addEventListener('change', applyFilters);
document.getElementById('refresh-btn').addEventListener('click', loadData);

loadData();
</script>
</body>
</html>
